# Render blueprint for Relay.
#
# Push to GitHub, then in Render: "New +" → "Blueprint" → point at this repo.
# Render reads this file, provisions Postgres + Redis, then deploys api +
# worker from the multi-stage Dockerfile inside relay/.
#
# After first deploy the api boots, runs embedded migrations (APP_AUTO_MIGRATE
# is true), then starts serving. Open ${RELAY_API_URL}/ for the dashboard.

databases:
  - name: relay-postgres
    plan: free            # bump to "starter" or higher for prod
    databaseName: relay_db
    user: relay

services:
  # Redis instance — Render calls this a "Key Value" service in their UI but
  # the blueprint type is still `redis`. Stores the Asynq queue, pub/sub fan-
  # out channels, and the rate-limiter token buckets.
  - type: redis
    name: relay-redis
    plan: free
    ipAllowList: []       # internal-only access from web/worker services
    maxmemoryPolicy: noeviction  # Asynq needs durability for queued tasks

  # Public API: Gin HTTP server. preDeploy is unused — the api boots and
  # applies migrations itself before listening (APP_AUTO_MIGRATE=true).
  - type: web
    name: relay-api
    runtime: docker
    rootDir: relay
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerTarget: api      # multi-stage: pick the api stage
    plan: starter
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_AUTO_MIGRATE
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: relay-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: relay-redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true   # Render rolls a strong value at provision time
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: APP_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 168h
      # OpenTelemetry off by default — flip to true and set OTEL_ENDPOINT to
      # an OTLP collector (e.g. Grafana Cloud, Honeycomb) to enable tracing.
      - key: OTEL_ENABLED
        value: "false"

  # Background worker: consumes the Asynq queue, executes jobs, publishes
  # state-change events to Redis pub/sub so connected WebSocket clients on
  # the api instance see them in real time.
  - type: worker
    name: relay-worker
    runtime: docker
    rootDir: relay
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerTarget: worker
    plan: starter
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: relay-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: relay-redis
          property: connectionString
      - key: ASYNQ_CONCURRENCY
        value: "10"
