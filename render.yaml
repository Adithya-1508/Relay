# Render blueprint for Relay.
#
# Push to GitHub, then in Render: "New +" → "Blueprint" → point at this repo.
# Render reads this file, provisions Postgres + Redis, then deploys the api.
#
# COLOCATED MODE (default in this blueprint, $0/mo)
# -------------------------------------------------
# To stay on Render's free tier we boot the Asynq worker INSIDE the api
# process (APP_RUN_WORKER_IN_PROCESS=true). One free web service handles both
# HTTP traffic and job execution. Trade-off: the api sleeps after 15 min idle,
# so jobs only execute while someone is poking the service.
#
# SCALED-OUT MODE (production, ~$7/mo for the worker)
# ---------------------------------------------------
# 1. Remove APP_RUN_WORKER_IN_PROCESS from the api service's envVars below.
# 2. Uncomment the relay-worker service block at the bottom of this file.
# 3. (Optional) Bump relay-api from `free` to `starter` so the api never sleeps.

databases:
  - name: relay-postgres
    plan: free            # auto-deletes after 30 days; bump to basic_256mb to persist
    databaseName: relay_db
    user: relay

services:
  # Redis — Render calls this a "Key Value" service in their UI but the
  # blueprint type is `redis`. Stores Asynq queue + pub/sub channels + rate
  # limiter token buckets.
  - type: redis
    name: relay-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: noeviction  # Asynq needs durability for queued tasks

  # API + colocated worker. Default CMD in the Dockerfile is /app/api; the
  # in-process worker is started by the api when APP_RUN_WORKER_IN_PROCESS=true.
  - type: web
    name: relay-api
    runtime: docker
    rootDir: relay
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free             # sleeps after 15min idle; bump to starter for always-on
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_AUTO_MIGRATE
        value: "true"      # runs embedded migrations at boot
      - key: APP_RUN_WORKER_IN_PROCESS
        value: "true"      # remove this line to use the separate worker service below
      - key: DATABASE_URL
        fromDatabase:
          name: relay-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: relay-redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: APP_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 168h
      - key: ASYNQ_CONCURRENCY
        value: "10"
      - key: OTEL_ENABLED
        value: "false"

  # ------------------------------------------------------------------------
  # Uncomment to run the worker as its own service (production scale-out).
  # Don't forget to drop APP_RUN_WORKER_IN_PROCESS from relay-api above so
  # tasks aren't consumed twice.
  # ------------------------------------------------------------------------
  # - type: worker
  #   name: relay-worker
  #   runtime: docker
  #   rootDir: relay
  #   dockerfilePath: ./Dockerfile
  #   dockerContext: .
  #   dockerCommand: /app/worker
  #   plan: starter        # workers have no free tier on Render — $7/mo minimum
  #   autoDeploy: true
  #   envVars:
  #     - key: APP_ENV
  #       value: production
  #     - key: DATABASE_URL
  #       fromDatabase:
  #         name: relay-postgres
  #         property: connectionString
  #     - key: REDIS_URL
  #       fromService:
  #         type: redis
  #         name: relay-redis
  #         property: connectionString
  #     - key: ASYNQ_CONCURRENCY
  #       value: "10"
